/* ——— Design system ——— */
:root {
  --bg-0: oklch(0.09 0.012 250);
  --bg-1: oklch(0.12 0.014 250);

  --text-0: oklch(0.98 0.005 250);
  --text-1: oklch(0.86 0.008 250);

  --text-3: oklch(0.48 0.012 250);

*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {

.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.app { position: fixed; inset: 0; overflow: hidden; }
.globe-canvas {

<script>
(function(){
  const ANCHOR = new Date(Date.UTC(2016, 1, 1));
  const TOTAL_DAYS = Math.round((new Date(Date.UTC(2026, 3, 30)) - ANCHOR) / 86400000);
  function monthIndex(ym){ return window.PRICES.findIndex(p=>p[0]===ym); }
  function formatMonth(ym){
    if(!ym) return '';
    const [y,m]=ym.split('-').map(Number);
    const names=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${names[m-1]} ${y}`;
  }
  function dayFromYmDay(ym,day){
    const [y,m]=ym.split('-').map(Number);
    return Math.round((Date.UTC(y,m-1,day)-ANCHOR.getTime())/86400000);
  }
  function priceAt(ym){
    const row=window.PRICES.find(p=>p[0]===ym);
    return row?{ym,hh:row[1],jkm:row[2],ttf:row[3]}:null;
  }
  function activeCargoes(dayIdx, filters){
    const out=[];
    for(const c of window.CARGOES){
      const start=dayFromYmDay(c.departMonth,c.departDay);
      const end=start+c.transitDays;
      if(dayIdx<start||dayIdx>end) continue;
      if(filters.origins.size && !filters.origins.has(c.originId)) continue;
      const dest=window.DESTINATIONS.find(d=>d.id===c.destId);
      if(filters.regions.size && !filters.regions.has(dest.region)) continue;
      if(filters.countries.size && !filters.countries.has(c.destId)) continue;
      const t=(dayIdx-start)/c.transitDays;
      out.push({...c, t, startDay:start, endDay:end});
    }
    return out;
  }
  function recentArrivals(dayIdx, windowDays=6){
    const out=[];
    for(const c of window.CARGOES){
      const start=dayFromYmDay(c.departMonth,c.departDay);
      const end=start+c.transitDays;
      const since=dayIdx-end;
      if(since>=0 && since<=windowDays){
        out.push({...c, arrivedDay:end, agoDays:since, intensity: 1 - (since/windowDays)});
      }
    }
    return out;
  }
  function dateFromDay(dayIdx){ return new Date(ANCHOR.getTime()+dayIdx*86400000); }
  function ymFromDay(dayIdx){
    const d=dateFromDay(dayIdx);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}`;
  }
  window.UTIL = { ANCHOR, TOTAL_DAYS, monthIndex, formatMonth, dayFromYmDay, priceAt, activeCargoes, recentArrivals, dateFromDay, ymFromDay };
})();
</script>

  pac_peru:        [-15.0,  -82.0],   // Open Pacific west of Peru
  pac_chile:       [-30.0,  -80.0],   // Open Pacific west of Chile approach

  sinai_s:         [ 26.8,  34.5],   // Open Red Sea south of Ras Muhammad / Sinai tip

  pgulf:           [ 26.5,  55.0],   // Inside Persian Gulf, west of Hormuz

  magellan_e:      [-52.5, -68.5],
  magellan_w:      [-53.0, -75.0],
  // South Atlantic — east of Brazilian coast (avoids Brazilian landmass)
  atl_mid:         [ 10.0,  -38.0],   // Mid-Atlantic, east of Amazon mouth
  atl_bul:         [ -4.0,  -27.0],   // East of Brazilian bulge (Cape São Roque)
  atl_south:       [-35.0,  -40.0],   // South Atlantic, east of Uruguay/Argentina
};

const W = window.WAYPOINTS;

function routeFor(origin, dest) {
  const gulf = origin.lon < -85;   // Gulf terminals (Sabine, Corpus, Cameron, Freeport, etc.)
  const region = dest.region;
  const id = dest.id;

  // Panama Canal approach — Gulf: south via Yucatan Channel + W.Caribbean to avoid land
  //                         East coast: via Eastern Caribbean (Windward Passage → Panama)
  const panPre = gulf
    ? [W.yucatan_ch, W.carib_w, W.panama_atl, W.panama_pac]
    : [W.windward, W.panama_atl, W.panama_pac];

  if (region === 'Europe') {
    // Gulf: exit via Florida Straits → north of Bahamas → open Atlantic
    // East coast: directly east into North Atlantic
    const pre = gulf ? [W.gulf_exit, W.bahamas_e] : [];
    const med = ['es','fr','it','tr','gr','hr','mt'];
    if (med.includes(id)) return [...pre, W.gibraltar_w, W.gibraltar];
    if (['pl','lt','fi'].includes(id)) return [...pre, W.english_channel];
    return [...pre, W.biscay];
  }

  if (region === 'Asia') {
    // Suez route (India / Pakistan / Bangladesh / SE Asia)
    if (['in','pk','bd','th','sg','id','my'].includes(id)) {
      const pre = gulf ? [W.gulf_exit, W.bahamas_e] : [];
      return [...pre, W.gibraltar_w, W.gibraltar, W.suez_med, W.suez_red, W.bab_el_mandeb, W.gulf_aden, W.indian_mid];
    }
    // Pacific via Panama
    if (id === 'ph') return [...panPre, W.pacific_mid, W.taiwan_s];
    if (id === 'cn') return [...panPre, W.pacific_mid, W.e_china];   // East China Sea approach, north of Taiwan
    if (id === 'tw') return [...panPre, W.pacific_mid, W.taiwan_s];  // South/strait approach
    if (id === 'jp') return [...panPre, W.pacific_mid];
    if (id === 'kr') return [...panPre, W.pacific_mid, W.kyushu_s];
    return [...panPre, W.pacific_mid];
  }

  if (region === 'MENA') {
    const pre = gulf ? [W.gulf_exit, W.bahamas_e] : [];
    // Mediterranean ports — straight across Med, no land issues
    if (['eg','il'].includes(id)) return [...pre, W.gibraltar_w, W.gibraltar];
    // Jordan (Aqaba): must round Sinai tip south of Ras Muhammad, then north up Gulf of Aqaba
    if (id === 'jo') return [...pre, W.gibraltar_w, W.gibraltar, W.suez_med, W.suez_red, W.sinai_s];
    // Persian Gulf (Kuwait, Bahrain, UAE): Red Sea → Bab el-Mandeb → Arabian Sea → Hormuz → inside Gulf
    return [...pre, W.gibraltar_w, W.gibraltar, W.suez_med, W.suez_red, W.bab_el_mandeb, W.gulf_aden, W.hormuz, W.pgulf];
  }

  if (region === 'LatAm') {
    // Mexico: Gulf coast destination — short hop across Gulf, no waypoints
    if (id === 'mx') return [];
    // Bahamas: northeast from gulf_exit, already in open water
    if (id === 'bs') return gulf ? [W.gulf_exit] : [];
    // Caribbean islands: Gulf exits via Florida Straits → north of Bahamas → Windward Passage
    if (['do','jm'].includes(id)) return gulf ? [W.gulf_exit, W.bahamas_e, W.windward_pass] : [];
    // Colombia: via Windward Passage into Caribbean
    if (id === 'co') return gulf ? [W.gulf_exit, W.bahamas_e, W.windward_pass] : [W.windward_pass];
    // Brazil: east across Atlantic then south, routing east of Brazilian bulge to avoid land
    if (id === 'br') {
      const carib = gulf ? [W.gulf_exit, W.bahamas_e, W.windward_pass, W.windward] : [W.windward];
      return [...carib, W.atl_mid, W.atl_bul];
    }
    // Argentina: same Atlantic arc then south past Uruguay
    if (id === 'ar') {
      const carib = gulf ? [W.gulf_exit, W.bahamas_e, W.windward_pass, W.windward] : [W.windward];
      return [...carib, W.atl_mid, W.atl_bul, W.atl_south];
    }
    // Pacific side via Panama
    if (id === 'sv') return [...panPre, W.pac_ca];
    // Chile: Panama → hug open Pacific well west of Andean coast
    if (id === 'cl') return [...panPre, W.pac_col, W.pac_peru, W.pac_chile];
    if (id === 'pa') return panPre;
    return [];
  }

  if (region === 'Africa') {
    // Mauritania / Senegal: cross Atlantic via Gibraltar area, then south
    const pre = gulf ? [W.gulf_exit, W.bahamas_e] : [];
    return [...pre, W.gibraltar_w];
  }

  return [];
}

window.ROUTE_FOR = routeFor;

window.buildRoute = function(origin, dest) {
  const mid = routeFor(origin, dest);
  return [[origin.lat, origin.lon], ...mid.map(w => [w[0], w[1]]), [dest.lat, dest.lon]];
};

function gcDist(a, b) {
  const toRad = d => d * Math.PI / 180;
  const [la1, lo1] = a.map(toRad);
  const [la2, lo2] = b.map(toRad);
  const dLa = la2 - la1, dLo = lo2 - lo1;
  const h = Math.sin(dLa/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLo/2)**2;
  return 2 * Math.asin(Math.sqrt(Math.min(1, h)));
}

window.routeSegmentInfo = function(origin, dest) {
  const pts = window.buildRoute(origin, dest);
  const segs = [];
  let total = 0;
  for (let i = 0; i < pts.length - 1; i++) {
    const d = gcDist(pts[i], pts[i+1]);
    segs.push({ from: pts[i], to: pts[i+1], len: d, cum: total });
    total += d;
  }
  return { pts, segs, total };
};

window.routePointAt = function(origin, dest, t) {
  const info = window.routeSegmentInfo(origin, dest);
  const target = t * info.total;
  for (const seg of info.segs) {
    if (target <= seg.cum + seg.len || seg === info.segs[info.segs.length - 1]) {
      const localT = seg.len > 0 ? (target - seg.cum) / seg.len : 0;
      const toXYZ = (lat, lon) => {
        const phi = (90 - lat) * Math.PI / 180;
        const theta = (lon + 180) * Math.PI / 180;
        return { x: -Math.sin(phi)*Math.cos(theta), y: Math.cos(phi), z: Math.sin(phi)*Math.sin(theta) };
      };
      const a = toXYZ(seg.from[0], seg.from[1]);
      const b = toXYZ(seg.to[0], seg.to[1]);
      const dot = Math.max(-1, Math.min(1, a.x*b.x + a.y*b.y + a.z*b.z));
      const omega = Math.acos(dot);
      let p;
      if (omega < 1e-6) p = a;
      else {
        const sinO = Math.sin(omega);
        const k1 = Math.sin((1 - localT) * omega) / sinO;
        const k2 = Math.sin(localT * omega) / sinO;
        p = { x: a.x*k1+b.x*k2, y: a.y*k1+b.y*k2, z: a.z*k1+b.z*k2 };
      }
      const lat = 90 - Math.acos(p.y) * 180 / Math.PI;
      const lon = Math.atan2(p.z, -p.x) * 180 / Math.PI - 180;
      return [lat, ((lon + 540) % 360) - 180];
    }
  }
  return [dest.lat, dest.lon];
};
</script>

function _latLonToVec3(lat, lon, r) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return [
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta),
  ];
}

function _densifyRing(ring, maxStep = 1.5) {
  const out = [];
  for (let i = 0; i < ring.length - 1; i++) {
    const [lon1, lat1] = ring[i];
    const [lon2, lat2] = ring[i+1];
    out.push([lon1, lat1]);
    const dist = Math.hypot(lon2 - lon1, lat2 - lat1);
    const n = Math.ceil(dist / maxStep);
    for (let k = 1; k < n; k++) {
      const t = k / n;
      out.push([lon1 + (lon2-lon1)*t, lat1 + (lat2-lat1)*t]);
    }
  }
  out.push(ring[ring.length-1]);
  return out;
}

function _pointInRing(x, y, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    const intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi + 1e-12) + xi);

}

// Post-process earcut triangles: recursively split any triangle whose longest
// edge spans more than maxDeg degrees so that flat triangles never sink below
// the sphere surface (which would be clipped by the depth buffer).
function _subdivideTris(flatIn, trisIn, maxDeg) {
  // Mutable vertex list [lon, lat, lon, lat, ...]
  const verts = flatIn.slice();
  const midCache = new Map();

  function getMid(i, j) {
    const key = i < j ? `${i}_${j}` : `${j}_${i}`;
    if (midCache.has(key)) return midCache.get(key);
    const lon1 = verts[i*2], lat1 = verts[i*2+1];
    const lon2 = verts[j*2], lat2 = verts[j*2+1];
    // Great-circle slerp at t=0.5, then convert back to lon/lat
    const toV = (la, lo) => {
      const ph = (90-la)*Math.PI/180, th = (lo+180)*Math.PI/180;
      return [-Math.sin(ph)*Math.cos(th), Math.cos(ph), Math.sin(ph)*Math.sin(th)];
    };
    const a = toV(lat1,lon1), b = toV(lat2,lon2);
    const dot = Math.max(-1, Math.min(1, a[0]*b[0]+a[1]*b[1]+a[2]*b[2]));
    const om = Math.acos(dot);
    let mx, my, mz;
    if (om < 1e-6) {
      [mx, my, mz] = a;
    } else {
      const s = Math.sin(om), k = Math.sin(om*0.5)/s;
      mx = a[0]*k + b[0]*k; my = a[1]*k + b[1]*k; mz = a[2]*k + b[2]*k;
      const len = Math.sqrt(mx*mx + my*my + mz*mz);
      mx/=len; my/=len; mz/=len;
    }
    const mla = 90 - Math.acos(Math.max(-1, Math.min(1, my))) * 180/Math.PI;
    const mlo = ((Math.atan2(mz, -mx)*180/Math.PI - 180 + 540) % 360) - 180;
    const idx = verts.length / 2;
    verts.push(mlo, mla);
    midCache.set(key, idx);
    return idx;
  }

  function edgeSpan(i, j) {
    const dlon = verts[j*2]   - verts[i*2];
    const dlat = verts[j*2+1] - verts[i*2+1];
    return Math.sqrt(dlon*dlon + dlat*dlat);
  }

  const out = [];
  function sub(a, b, c, depth) {
    if (depth >= 5) { out.push(a,b,c); return; }
    const dab = edgeSpan(a,b), dbc = edgeSpan(b,c), dca = edgeSpan(c,a);
    if (Math.max(dab, dbc, dca) <= maxDeg) { out.push(a,b,c); return; }
    const mab = getMid(a,b), mbc = getMid(b,c), mca = getMid(c,a);
    sub(a, mab, mca, depth+1);
    sub(mab, b,  mbc, depth+1);
    sub(mca, mbc, c,  depth+1);
    sub(mab, mbc, mca, depth+1);
  }

  for (let i = 0; i < trisIn.length; i += 3) sub(trisIn[i], trisIn[i+1], trisIn[i+2], 0);
  return { verts, tris: out };
}

function _buildPolygonMesh(polygon, radius, THREE) {
  const allFlat = [];
  const holeIndices = [];
  const rings = polygon.map(r => _densifyRing(r, 0.15));
  rings.forEach((ring, ri) => {
    if (ri > 0) holeIndices.push(allFlat.length / 2);
    const end = ring.length - (ring[0][0] === ring[ring.length-1][0] && ring[0][1] === ring[ring.length-1][1] ? 1 : 0);
    for (let i = 0; i < end; i++) allFlat.push(ring[i][0], ring[i][1]);
  });
  const rawTris = window.earcut(allFlat, holeIndices);
  if (!rawTris.length) return null;

  // Subdivide so no triangle spans more than 4° — keeps flat triangles above
  // the sphere surface (r=1.0) when vertices are projected to r=1.003.
  const { verts: sdVerts, tris: sdTris } = _subdivideTris(allFlat, rawTris, 4);

  const nVerts = sdVerts.length / 2;
  const positions = new Float32Array(nVerts * 3);
  for (let i = 0; i < nVerts; i++) {
    const lon = sdVerts[i*2], lat = sdVerts[i*2+1];
    const [x,y,z] = _latLonToVec3(lat, lon, radius);
    positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setIndex(Array.from(sdTris));
  return geo;
}

window.createCountryLayer = async function(parent, THREE, radius) {
  if (!window.topojson) await _loadScript(TOPOJSON_URL);
  if (!window.earcut)   await _loadScript(EARCUT_URL);

  const topoRes = await fetch(COUNTRIES_URL);
  const topo = await topoRes.json();
  const geo = window.topojson.feature(topo, topo.objects.countries);

  const perCountry = {};
  geo.features.forEach(f => {
    let id = String(f.id ?? '');
    if (id.length < 3) id = id.padStart(3, '0');
    const destId = ISO_N_TO_DEST[id];
    if (!destId) return;
    const polys = f.geometry.type === 'Polygon' ? [f.geometry.coordinates] : f.geometry.coordinates;
    polys.forEach(p => {
      const g = _buildPolygonMesh(p, radius * 1.003, THREE);
      if (g) { (perCountry[destId] ||= []).push(g); }
    });
  });

  const countryMeshes = {};
  Object.entries(perCountry).forEach(([destId, geos]) => {
    const group = new THREE.Group();
    const mat = new THREE.MeshBasicMaterial({
      color: 0xffc060, transparent: true, opacity: 0,
      blending: THREE.NormalBlending, depthWrite: false, side: THREE.DoubleSide,
    });
    geos.forEach(g => {
      const m = new THREE.Mesh(g, mat);
      m.renderOrder = 2;
      m.userData.destId = destId;  // needed for hover raycasting
      group.add(m);
    });
    parent.add(group);
    countryMeshes[destId] = { group, mat, intensity: 0, target: 0, cumulative: 0 };
  });

  return {
    _meshes: countryMeshes,
    getCountryMeshes() {
      const out = [];
      Object.values(countryMeshes).forEach(c => c.group.children.forEach(m => out.push(m)));
      return out;
    },
    setCumulative(destId, count) {
      const c = countryMeshes[destId];
      if (!c) return;
      c.cumulative = count;
      c.target = Math.min(0.55, 0.18 + Math.log10(count + 1) * 0.18);
    },
    pulse(destId) {
      const c = countryMeshes[destId];
      if (!c) return;
      c.cumulative += 1;
      c.intensity = Math.max(c.intensity, 0.7);
      c.target = Math.min(0.55, 0.18 + Math.log10(c.cumulative + 1) * 0.18);
    },
    reset() {
      Object.values(countryMeshes).forEach(c => {
        c.cumulative = 0; c.intensity = 0; c.target = 0; c.mat.opacity = 0;
      });
    },
    tick(dt) {
      Object.values(countryMeshes).forEach(c => {
        c.intensity += (c.target - c.intensity) * 0.06;
        c.mat.opacity = c.intensity;
      });
    },
    destroy() {
      Object.values(countryMeshes).forEach(c => {
        c.group.traverse(o => { if (o.geometry) o.geometry.dispose(); });
        if (c.mat) c.mat.dispose();
        parent.remove(c.group);
      });
    },
  };
};
</script>

  function resize() {
    const rect = mount.getBoundingClientRect();
    if (!rect.width || !rect.height) return;
    renderer.setSize(rect.width, rect.height, true);
    camera.aspect = rect.width / rect.height;
    camera.updateProjectionMatrix();
  }
  resize();
  const ro = new ResizeObserver(resize);
  ro.observe(mount);

  let currentCargoes = [], selectedCargoId = null, showTrails = true;

  function setState(next) {
    if (next.cargoes       !== undefined) currentCargoes   = next.cargoes;
    if (next.selectedCargoId !== undefined) selectedCargoId = next.selectedCargoId;
    if (next.showTrails    !== undefined) showTrails        = next.showTrails;
    if (next.view          !== undefined) setView(next.view);
    if (next.nightStrength !== undefined) earthMat.uniforms.uNightStrength.value = next.nightStrength;
  }

  function handleArrivals(arrivals) {
    arrivals.forEach(c => {
      if (countryLayer) countryLayer.pulse(c.destId);
      else pendingSeedCounts[c.destId] = (pendingSeedCounts[c.destId]||0) + 1;
    });
  }
  function seedHistoricalArrivals(all) {
    const counts = {};
    all.forEach(c => { counts[c.destId] = (counts[c.destId]||0) + 1; });
    pendingSeedCounts = counts;
    pendingSeedArrivals = true;
    if (countryLayer) {
      countryLayer.reset();
      Object.entries(counts).forEach(([id, n]) => countryLayer.setCumulative(id, n));
    }
  }
  function resetArrivalMemory() {
    pendingSeedCounts = {};
    if (countryLayer) countryLayer.reset();
  }

  const clock = new THREE.Clock();
  function animate() {
    const dt = Math.min(0.05, clock.getDelta());

    rot.pitch += (rot.tPitch - rot.pitch) * 0.08;
    rot.yaw   += (rot.tYaw   - rot.yaw  ) * 0.08;
    zoom.v    += (zoom.target - zoom.v   ) * 0.08;

    const cx = Math.cos(rot.pitch) * Math.sin(rot.yaw);
    const cy = Math.sin(rot.pitch);
    const cz = Math.cos(rot.pitch) * Math.cos(rot.yaw);
    camera.position.set(cx * zoom.v, cy * zoom.v, cz * zoom.v);
    camera.lookAt(0, 0, 0);
    camera.clearViewOffset();

    // Cinematic sun lighting
    const camDir = camera.position.clone().normalize();
    const upV    = new THREE.Vector3(0, 1, 0);
    const rightV = new THREE.Vector3().crossVectors(camDir, upV).normalize();
    const sunDir = camDir.clone().multiplyScalar(0.8)
      .add(rightV.multiplyScalar(0.35))
      .add(upV.clone().multiplyScalar(0.2))
      .normalize();
    earthMat.uniforms.uSunDir.value.copy(sunDir);
    earthMat.uniforms.uCameraPos.value.copy(camera.position);

    if (countryLayer) countryLayer.tick(dt);

    hideAllCargo();
    hideAllTrails();
    currentCargoes.forEach(c => {
      const origin = window.TERMINALS.find(t => t.id === c.originId);
      const dest   = window.DESTINATIONS.find(d => d.id === c.destId);
      if (!origin || !dest) return;
      const pts = getRoutePts(origin, dest);
      const idx = Math.floor(c.t * (pts.length - 1));
      const pos = pts[idx] || pts[0];

      const mesh = getCargoMesh();
      mesh.position.copy(pos);
      mesh.userData.cargoRef = c;
      const isSel = selectedCargoId === c.id;
      mesh.userData.ship.material.color.set(isSel ? 0xff9b6b : 0x9fd6ff);
      mesh.userData.glow.material.color.set(isSel ? 0xff9b6b : 0x9fd6ff);
      mesh.userData.glow.scale.set(isSel ? 0.04 : 0.025, isSel ? 0.04 : 0.025, 1);

      if (showTrails) {
        const trail   = getTrailLine();
        const trailPts = pts.slice(0, idx + 1);
        const arr = new Float32Array(trailPts.length * 3);
        trailPts.forEach((p, i) => { arr[i*3]=p.x; arr[i*3+1]=p.y; arr[i*3+2]=p.z; });
        trail.geometry.setAttribute('position', new THREE.BufferAttribute(arr, 3));
        trail.geometry.setDrawRange(0, trailPts.length);
        trail.geometry.attributes.position.needsUpdate = true;
        trail.geometry.computeBoundingSphere();
        trail.material.color.set(isSel ? 0xffb366 : 0x7ec5ff);
        trail.material.opacity = isSel ? 0.85 : 0.45;
      }
    });

    renderer.render(scene, camera);
    raf = requestAnimationFrame(animate);
  }
  let raf = requestAnimationFrame(animate);

  return {
    setState, setView, handleArrivals, seedHistoricalArrivals, resetArrivalMemory,
    destroy() {
      cancelAnimationFrame(raf); ro.disconnect();
      if (countryLayer) countryLayer.destroy();
      renderer.dispose(); mount.removeChild(renderer.domElement);
    },
  };
};
</script>

<script type="text/babel" data-presets="react">

function Sparkline({ series, color, currentIdx, pinIdx }) {
  const w = 180, h = 20;
  const vals = series.map(s => s.v);
  const min = Math.min(...vals) * 0.85;
  const max = Math.max(...vals) * 1.05;
  const xAt = i => (i / (series.length-1)) * w;
  const yAt = v => h - ((v - min) / (max - min)) * (h - 4) - 2;
  let d = '', a = '';
  series.forEach((s, i) => {
    d += (i===0?'M ':'L ') + xAt(i).toFixed(1) + ' ' + yAt(s.v).toFixed(1) + ' ';
    a += (i===0?'M '+xAt(i).toFixed(1)+' '+h+' ':'L '+xAt(i).toFixed(1)+' '+yAt(s.v).toFixed(1)+' ');
  });
  a += `L ${xAt(series.length-1).toFixed(1)} ${h} Z`;
  const gid = `g-${color.replace(/[^a-z0-9]/gi,'')}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width: '100%', height: h, display: 'block' }}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor={color} stopOpacity="0.3" />
          <stop offset="100%" stopColor={color} stopOpacity="0"   />
        </linearGradient>
      </defs>
      <path d={a} fill={`url(#${gid})`} />
      <path d={d} stroke={color} strokeWidth="1.2" fill="none" strokeLinecap="round" strokeLinejoin="round" />
      {currentIdx != null && (
        <>
          <line x1={xAt(currentIdx)} y1="0" x2={xAt(currentIdx)} y2={h}

      )}

        <circle cx={xAt(pinIdx)} cy={yAt(series[pinIdx].v)} r="2.5" fill="#ff7a5c" stroke="#fff" strokeWidth="0.8" />
      )}

  );
}

function RegionPieChart({ dayIdx, unit }) {
  const REGION_COLORS = {
    Europe: '#8ab8ff', Asia: '#6edcb0', LatAm: '#ffbb5a', MENA: '#f97583', Africa: '#b392f0',
  };
  const data = React.useMemo(() => {
    const totals = {};
    let cargoCount = 0;
    for (const c of window.CARGOES) {
      const end = window.UTIL.dayFromYmDay(c.departMonth, c.departDay) + c.transitDays;
      if (end > dayIdx) continue;
      const dest = window.DESTINATIONS.find(d => d.id === c.destId);
      if (!dest) continue;
      totals[dest.region] = (totals[dest.region] || 0) + parseFloat(c.volumeBcf);
      cargoCount++;
    }
    return { totals, cargoCount };
  }, [dayIdx]);

  const { totals, cargoCount } = data;

  const entries = Object.entries(totals).sort((a, b) => b[1] - a[1]);
  const total = entries.reduce((s, [, v]) => s + v, 0);
  if (!total) return null;

  const cx = 55, cy = 55, R = 46, ri = 26;
  let angle = -Math.PI / 2;
  const slices = entries.map(([region, bcf]) => {
    const frac = bcf / total;
    const sweep = frac * 2 * Math.PI;
    const x1 = cx + R * Math.cos(angle),   y1 = cy + R * Math.sin(angle);
    const x2 = cx + R * Math.cos(angle + sweep), y2 = cy + R * Math.sin(angle + sweep);
    const ix1 = cx + ri * Math.cos(angle),  iy1 = cy + ri * Math.sin(angle);
    const ix2 = cx + ri * Math.cos(angle + sweep), iy2 = cy + ri * Math.sin(angle + sweep);
    const large = sweep > Math.PI ? 1 : 0;
    const d = `M${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R},0,${large},1,${x2.toFixed(2)},${y2.toFixed(2)} L${ix2.toFixed(2)},${iy2.toFixed(2)} A${ri},${ri},0,${large},0,${ix1.toFixed(2)},${iy1.toFixed(2)} Z`;
    angle += sweep;
    return { region, bcf, frac, d, color: REGION_COLORS[region] || '#888' };
  });

  return (
    <div className="panel regions-pie">
      <div className="markets-header">
        <span className="markets-title">Destinations</span>
        <span className="markets-date">{unit==='Bcm'?(total*0.0283).toFixed(1)+' Bcm':total.toFixed(1)+' Bcf'}</span>
      </div>
      <div style={{fontFamily:'var(--font-mono)',fontSize:'9px',color:'var(--text-3)',letterSpacing:'0.06em',marginBottom:'4px',marginTop:'-4px'}}>
        {cargoCount.toLocaleString()} cargoes delivered
      </div>
      <div className="pie-body">
        <svg width="90" height="90" viewBox="0 0 110 110" style={{flexShrink:0}}>
          {slices.map(s => <path key={s.region} d={s.d} fill={s.color} opacity="0.88" />)}
        </svg>
        <div className="pie-legend">
          {slices.map(s => (
            <div key={s.region} className="pie-row">
              <span className="pie-swatch" style={{background: s.color}} />
              <span className="pie-label">{s.region}</span>
              <span className="pie-pct">{(s.frac * 100).toFixed(0)}%</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}


function EnvChart({ curYm, unit }) {

  const mData = window.METHANE;
  const gData = window.GAS_PROD;
  if (!mData || !gData || !mData.length) return null;

  const mVals = mData.map(r => r[1]);
  const gVals = gData.map(r => r[1]);
  const mLo = Math.min(...mVals)*0.92, mHi = Math.max(...mVals)*1.04;
  const gLo = Math.min(...gVals)*0.97, gHi = Math.max(...gVals)*1.01;
  const xAt = i => (i / (mData.length - 1)) * w;
  const myAt = v => h - ((v - mLo) / (mHi - mLo)) * h;
  const gyAt = v => h - ((v - gLo) / (gHi - gLo)) * h;
  const mPts = mData.map((r, i) => `${xAt(i).toFixed(1)},${myAt(r[1]).toFixed(1)}`).join(' ');
  const gPts = gData.map((r, i) => `${xAt(i).toFixed(1)},${gyAt(r[1]).toFixed(1)}`).join(' ');

  const si = Math.max(0, mData.findIndex(r => r[0] === curYm));
  const cx = xAt(si);
  const curM = mData[si][1], prevM = si > 0 ? mData[si-1][1] : curM;
  const curG = gData[si][1], prevG = si > 0 ? gData[si-1][1] : curG;
  const dM = curM - prevM, dG = curG - prevG;

  return (
    <div className="panel methane-panel">
      <div className="markets-header">
        <span className="markets-title">Production &amp; Emissions</span>
        <span className="markets-date">{window.UTIL.formatMonth(curYm)}</span>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px'}}>
        <div>
          <div style={{fontSize:'9px',color:'#f97583',fontFamily:'var(--font-mono)',letterSpacing:'0.1em',marginBottom:'1px'}}>● METHANE INT.</div>
          <div style={{fontFamily:'var(--font-mono)',fontSize:'12px',fontWeight:'600',color:'var(--text-0)'}}>{curM.toFixed(2)}%</div>
          <div style={{fontSize:'8px',fontFamily:'var(--font-mono)',color:dM<0?'var(--mint)':'var(--coral)'}}>{dM>=0?'+':''}{dM.toFixed(3)}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:'9px',color:'#6edcb0',fontFamily:'var(--font-mono)',letterSpacing:'0.1em',marginBottom:'1px'}}>● GAS PROD.</div>
          <div style={{fontFamily:'var(--font-mono)',fontSize:'12px',fontWeight:'600',color:'var(--text-0)'}}>{unit==='Bcm'?(curG*0.0283).toFixed(2)+' Bcm/d':curG.toFixed(1)+' Bcf/d'}</div>
          <div style={{fontSize:'8px',fontFamily:'var(--font-mono)',color:dG>=0?'var(--mint)':'var(--coral)'}}>{dG>=0?'+':''}{unit==='Bcm'?(dG*0.0283).toFixed(3):(dG.toFixed(1))}</div>
        </div>
      </div>
      <div className="methane-chart-wrap">
        <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:'block',overflow:'visible'}}>
          <polyline points={mPts} fill="none" stroke="#f97583" strokeWidth="1.5" strokeLinejoin="round" />
          <polyline points={gPts} fill="none" stroke="#6edcb0" strokeWidth="1.5" strokeLinejoin="round" />
          <line x1={cx} y1={0} x2={cx} y2={h} stroke="oklch(1 0 0 / 0.2)" strokeWidth="1" strokeDasharray="3,3" />
          <circle cx={cx} cy={myAt(curM)} r="2.5" fill="#f97583" />
          <circle cx={cx} cy={gyAt(curG)} r="2.5" fill="#6edcb0" />
        </svg>
        <div className="methane-axis">
          <span>2016</span><span>2019</span><span>2022</span><span>2025</span>
        </div>
      </div>
      <div style={{fontSize:'8px',color:'var(--text-3)',fontFamily:'var(--font-mono)',letterSpacing:'0.04em',lineHeight:1.3}}>
        EPA GHGRP methane intensity · EIA dry gas production
      </div>
    </div>
  );
}

function CountryDrawer({ destId, onClose, dayIdx, unit }) {
  if (!destId) return null;
  const dest = window.DESTINATIONS.find(d => d.id === destId);
  if (!dest) return null;

  // Compute stats from all cargoes delivered to this country by current day
  const delivered = [];
  for (const c of window.CARGOES) {
    const end = window.UTIL.dayFromYmDay(c.departMonth, c.departDay) + c.transitDays;
    if (end <= dayIdx) delivered.push({ ...c, arrivalDay: end });
  }
  const countryCargoes = delivered.filter(c => c.destId === destId);
  const totalBcf = countryCargoes.reduce((s, c) => s + parseFloat(c.volumeBcf), 0);
  const count = countryCargoes.length;

  // First and most recent delivery
  const sorted = [...countryCargoes].sort((a, b) => a.arrivalDay - b.arrivalDay);
  const firstYm  = sorted.length ? window.UTIL.ymFromDay(sorted[0].arrivalDay) : null;
  const latestYm = sorted.length ? window.UTIL.ymFromDay(sorted[sorted.length - 1].arrivalDay) : null;

  // Top 3 origin terminals by volume
  const byTerminal = {};
  for (const c of countryCargoes) {
    byTerminal[c.originId] = (byTerminal[c.originId] || 0) + parseFloat(c.volumeBcf);
  }
  const topTerminals = Object.entries(byTerminal)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3)
    .map(([id, bcf]) => ({ name: (window.TERMINALS.find(t => t.id === id) || {}).name || id, bcf }));
  const maxTermBcf = topTerminals[0]?.bcf || 1;

  const fmtVol = (bcf) => unit === 'Bcm' ? (bcf * 0.0283).toFixed(1) + ' Bcm' : bcf.toFixed(1) + ' Bcf';

  return (
    <div className="panel drawer">
      <div className="drawer-head">
        <span className="drawer-title">Destination · {dest.region}</span>
        <button className="drawer-close" onClick={onClose}>✕</button>
      </div>
      <div style={{marginBottom:'14px'}}>
        <div style={{fontSize:'9px',fontFamily:'var(--font-mono)',letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--text-3)',marginBottom:'3px'}}>Country</div>
        <div style={{fontSize:'18px',fontWeight:'700',color:'var(--text-0)',letterSpacing:'0.01em'}}>{dest.name}</div>
      </div>
      <dl className="kv-grid">
        <dt>Cargoes</dt>    <dd>{count.toLocaleString()}</dd>
        <dt>Total vol.</dt> <dd>{fmtVol(totalBcf)}</dd>
        <dt>First arr.</dt> <dd>{firstYm ? window.UTIL.formatMonth(firstYm) : '—'}</dd>
        <dt>Latest arr.</dt><dd>{latestYm ? window.UTIL.formatMonth(latestYm) : '—'}</dd>
      </dl>
      {topTerminals.length > 0 && (
        <div>
          <div style={{fontSize:'9px',fontFamily:'var(--font-mono)',letterSpacing:'0.15em',textTransform:'uppercase',color:'var(--text-3)',marginBottom:'8px'}}>Top Origins</div>
          {topTerminals.map(t => (
            <div key={t.name} style={{marginBottom:'7px'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:'3px'}}>
                <span style={{fontSize:'11px',color:'var(--text-1)',fontWeight:'500'}}>{t.name}</span>
                <span style={{fontSize:'10px',fontFamily:'var(--font-mono)',color:'var(--text-2)'}}>{fmtVol(t.bcf)}</span>
              </div>
              <div style={{height:'3px',background:'var(--border)',borderRadius:'2px',overflow:'hidden'}}>
                <div style={{height:'100%',width:`${(t.bcf/maxTermBcf)*100}%`,background:'var(--amber)',borderRadius:'2px'}} />
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

Object.assign(window, { MarketsPanel, Drawer, CountryDrawer, Timeline, Legend, RegionPieChart, EnvChart });
</script>

<!-- ═══════════════════════════════════════════════════════
     COMPONENT — App.jsx
═══════════════════════════════════════════════════════ -->
<script type="text/babel" data-presets="react">
const { useState: uS, useEffect: uE, useMemo: uM, useRef: uR, useCallback: uC } = React;

const TWEAK_DEFAULTS = { showTrails: true, nightStrength: 1.2, defaultView: 'americas' };

const VIEWS = [
  { id: 'us_gulf', label: 'US Gulf' },
  { id: 'latam',   label: 'LatAm'   },
  { id: 'europe',  label: 'Europe'  },
  { id: 'mena',    label: 'MENA'    },
  { id: 'asia',    label: 'Asia'    },
  { id: 'free',    label: 'Free orbit' },
];

function App() {
  const [dayIdx, setDayIdx] = uS(() => {
    try { const s = localStorage.getItem('uslng_day'); return s ? Number(s) : Math.round(window.UTIL.TOTAL_DAYS * 0.72); }
    catch { return Math.round(window.UTIL.TOTAL_DAYS * 0.72); }
  });
  const [playing,       setPlaying]       = uS(false);
  const [speed,         setSpeed]         = uS(4);
  const [view,          setView]          = uS(() => {
    try {
      const saved = localStorage.getItem('uslng_view');
      if (saved === 'americas') return 'us_gulf';
      return saved || 'us_gulf';
    } catch { return 'us_gulf'; }
  });
  const [selectedCargo,   setSelectedCargo]   = uS(null);
  const [selectedCountry, setSelectedCountry] = uS(null);
  const [tooltip,         setTooltip]         = uS(null);
  const [editMode,      setEditMode]      = uS(false);
  const [tweaks,        setTweaks]        = uS(TWEAK_DEFAULTS);
  const [unit,          setUnit]          = uS('Bcf');
  const [tlVisible,     setTlVisible]     = uS(true);
  const [ready,         setReady]         = uS(false);

  const mountRef    = uR(null);
  const globeRef    = uR(null);
  const lastDayRef  = uR(dayIdx);
  const dayIdxRef   = uR(dayIdx);  // kept in sync for callbacks created at mount time
  const unitRef     = uR('Bcf');   // kept in sync for tooltips

  uE(() => { try { localStorage.setItem('uslng_day', String(dayIdx)); } catch {} }, [dayIdx]);
  uE(() => { try { localStorage.setItem('uslng_view', view); } catch {} }, [view]);
  uE(() => { dayIdxRef.current = dayIdx; }, [dayIdx]);
  uE(() => { unitRef.current = unit; }, [unit]);

  // Mount globe
  uE(() => {
    if (!mountRef.current || globeRef.current) return;
    const check = () => {
      if (!window.THREE) { setTimeout(check, 60); return; }
      globeRef.current = window.createGlobe(mountRef.current, {
        initialView: view,
        onReady: () => setReady(true),
        onCargoHover: (c, x, y) => {
          if (!c) return setTooltip(null);
          const o = window.TERMINALS.find(t => t.id === c.originId);
          const d = window.DESTINATIONS.find(dd => dd.id === c.destId);
          const u = unitRef.current;
          const vol = u === 'Bcm' ? (c.volumeBcf * 0.0283).toFixed(3) + ' Bcm' : c.volumeBcf.toFixed(2) + ' Bcf';
          setTooltip({ x, y, text: `${o.name} → ${d.name} · ${vol}` });
        },
        onCargoClick: (c) => setSelectedCargo(c),
        onTerminalHover: (t, x, y) => {
          if (!t) return;
          setTooltip({ x, y, text: `${t.name} · ${t.state}` });
        },
        onCountryHover: (destId, x, y) => {
          if (!destId) return setTooltip(null);
          const dest = window.DESTINATIONS.find(d => d.id === destId);
          const currentDay = Math.round(dayIdxRef.current);
          let cumBcfTotal = 0;
          for (const c of window.CARGOES) {
            if (c.destId !== destId) continue;
            const end = window.UTIL.dayFromYmDay(c.departMonth, c.departDay) + c.transitDays;
            if (end <= currentDay) cumBcfTotal += parseFloat(c.volumeBcf);
          }
          const u2 = unitRef.current;
          const cumVal = u2 === 'Bcm' ? (cumBcfTotal * 0.0283).toFixed(1) + ' Bcm' : cumBcfTotal.toFixed(1) + ' Bcf';
          setTooltip({
            x, y,
            text: `${dest.name}  ·  ${cumVal} cumulative`,
          });
        },
        onCountryClick: (destId) => {
          setSelectedCountry(prev => prev === destId ? null : destId);
          setSelectedCargo(null);
        },
      });
    };
    check();
    return () => { if (globeRef.current) globeRef.current.destroy(); globeRef.current = null; };
  }, []);

  // Playback
  uE(() => {
    if (!playing) return;
    let raf, last = performance.now();
    const tick = (now) => {
      const dt = now - last; last = now;
      setDayIdx(d => {
        const next = d + (dt / 1000) * 30 * speed;
        if (next >= window.UTIL.TOTAL_DAYS) { setPlaying(false); return window.UTIL.TOTAL_DAYS; }
        return next;
      });
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [playing, speed]);

  // Region filter
  const regionFilter = uM(() => {
    const regions = new Set();
    if      (view === 'latam')  regions.add('LatAm');
    else if (view === 'europe') regions.add('Europe');
    else if (view === 'mena')   regions.add('MENA');
    else if (view === 'asia')   regions.add('Asia');
    return { origins: new Set(), regions, countries: new Set() };
  }, [view]);

  const dayInt    = Math.round(dayIdx);
  const cargoes   = uM(() => window.UTIL.activeCargoes(dayInt, regionFilter), [dayInt, regionFilter]);
  const recents   = uM(() => window.UTIL.recentArrivals(dayInt, 6), [dayInt]);
  const curYm     = window.UTIL.ymFromDay(dayInt);
  const curPrices = window.UTIL.priceAt(curYm);
  const prevIdx   = Math.max(0, window.UTIL.monthIndex(curYm) - 1);
  const prevPrices = window.PRICES[prevIdx]
    ? { hh: window.PRICES[prevIdx][1], jkm: window.PRICES[prevIdx][2], ttf: window.PRICES[prevIdx][3] }
    : null;
  const curIdx    = window.UTIL.monthIndex(curYm);

  const series = uM(() => ({
    hh:  window.PRICES.map(p => ({ ym: p[0], v: p[1] })),
    jkm: window.PRICES.map(p => ({ ym: p[0], v: p[2] })),
    ttf: window.PRICES.map(p => ({ ym: p[0], v: p[3] })),
  }), []);


  // Push to globe
  uE(() => {
    if (!globeRef.current || !ready) return;
    globeRef.current.setState({
      cargoes, selectedCargoId: selectedCargo?.id ?? null,
      showTrails: tweaks.showTrails, view, nightStrength: Number(tweaks.nightStrength),
    });
  }, [cargoes, selectedCargo, tweaks, view, ready]);

  // Arrivals
  const didInitArrivals = uR(false);
  uE(() => {
    if (!globeRef.current || !ready) return;
    const prev = lastDayRef.current;
    lastDayRef.current = dayInt;
    if (!didInitArrivals.current) {
      didInitArrivals.current = true;
      globeRef.current.resetArrivalMemory();
      const all = window.CARGOES.filter(c => {
        const end = window.UTIL.dayFromYmDay(c.departMonth, c.departDay) + c.transitDays;
        return end <= dayInt;
      });
      globeRef.current.seedHistoricalArrivals(all);
      return;
    }
    if (dayInt < prev - 2) {
      globeRef.current.resetArrivalMemory();
      const allUpTo = window.CARGOES.filter(c => {
        const end = window.UTIL.dayFromYmDay(c.departMonth, c.departDay) + c.transitDays;
        return end <= dayInt;
      });
      globeRef.current.seedHistoricalArrivals(allUpTo);
    } else {
      globeRef.current.handleArrivals(recents);
    }
  }, [dayInt, ready, recents]);

  // Edit-mode protocol
  uE(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = uC((k, v) => {
    setTweaks(prev => {
      const next = { ...prev, [k]: v };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
      return next;
    });
  }, []);

  return (
    <div className="app">
      <div className="globe-canvas" ref={mountRef} />
      {!ready && (
        <div className="globe-loading">
          Loading Earth imagery
          <div className="bar" />
        </div>
      )}

      {/* Top bar */}
      <div className="topbar">
        <div className="brand">
          <div className="brand-row">
            <div className="brand-mark" />
            <div className="brand-title">US LNG · Live Export Atlas</div>
          </div>
          <div className="brand-sub">Henry Hub · JKM · TTF — since Feb 2016</div>
        </div>
      </div>

      {/* Unit toggle — left side, below view switcher */}
      <div className="unit-toggle-wrap">
        <div className="unit-toggle">
          <button className={"unit-btn"+(unit==='Bcf'?' active':'')} onClick={()=>setUnit('Bcf')}>Bcf</button>
          <button className={"unit-btn"+(unit==='Bcm'?' active':'')} onClick={()=>setUnit('Bcm')}>Bcm</button>
        </div>
      </div>

      {/* View switcher */}
      <div className="view-switcher">
        {VIEWS.map(v => (
          <button key={v.id}
            className={"view-btn" + (view === v.id ? ' active' : '')}
            onClick={() => setView(v.id)}>
            {v.label}
          </button>
        ))}
      </div>

      <div className="right-panel-stack">
        <MarketsPanel curYm={curYm} curPrices={curPrices} prevPrices={prevPrices}
          series={series} curIdx={curIdx} pinIdx={null} />
        <RegionPieChart dayIdx={dayInt} unit={unit} />
        <EnvChart curYm={curYm} unit={unit} />
      </div>

      {selectedCargo && (
        <Drawer cargo={cargoes.find(c => c.id === selectedCargo.id) || selectedCargo}
          onClose={() => setSelectedCargo(null)} dayIdx={dayInt} unit={unit} />
      )}

      {selectedCountry && !selectedCargo && (
        <CountryDrawer destId={selectedCountry}
          onClose={() => setSelectedCountry(null)} dayIdx={dayInt} unit={unit} />
      )}


      <button className={"timeline-show-btn" + (tlVisible ? ' hidden' : '')} onClick={() => setTlVisible(true)}>
        <svg viewBox="0 0 10 10"><path d="M 2 7 L 5 3 L 8 7" /></svg>
        Timeline
      </button>

      <Timeline dayIdx={dayInt} setDayIdx={v => setDayIdx(v)} playing={playing} setPlaying={setPlaying}
        speed={speed} setSpeed={setSpeed} unit={unit}
        visible={tlVisible} setVisible={setTlVisible} />

      {editMode && (
        <div className="panel tweaks">
          <h3>Tweaks</h3>
          <div className="tweak-row">
            <label htmlFor="tw-tr">Cargo trails</label>
            <input id="tw-tr" type="checkbox" checked={tweaks.showTrails} onChange={e => updateTweak('showTrails', e.target.checked)} />
          </div>
          <div className="tweak-row">
            <label htmlFor="tw-ns">Night lights</label>
            <select id="tw-ns" value={tweaks.nightStrength} onChange={e => updateTweak('nightStrength', Number(e.target.value))}>
              <option value="0.6">Dim</option>
              <option value="1.2">Normal</option>
              <option value="2.2">Bright</option>
            </select>
          </div>
        </div>
      )}

      {tooltip && (
        <div className="tooltip" style={{ left: tooltip.x, top: tooltip.y }}>{tooltip.text}</div>
      )}
    </div>
  );
}

window.App = App;

const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
